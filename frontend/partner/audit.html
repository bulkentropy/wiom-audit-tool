<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiom — Live Audit</title>
  <link rel="stylesheet" href="/css/partner.css">
  <style>
    #scan-result-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.88);
      color: #fff;
      padding: 14px 16px 18px;
      text-align: center;
      z-index: 20;
    }
    #scan-result-label {
      font-size: 0.78rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    #scan-result-value {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #fff;
      margin-bottom: 12px;
      word-break: break-all;
    }
    #scan-result-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    #scan-confirm-btn, #scan-rescan-btn {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    #scan-confirm-btn { background: #22c55e; color: #fff; }
    #scan-rescan-btn  { background: #444;    color: #fff; }
    .grey-zone-header { color: #b45309; border-color: #fbbf24; background: #fffbeb; margin-top: 1.2rem; }
  </style>
  <!-- ZXing barcode library (CDN) -->
  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
</head>
<body>

<!-- Sticky progress bar -->
<div class="sticky-top">
  <div class="progress-label" id="progress-label">Loading…</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
  </div>
</div>

<!-- Camera area (hidden by default) -->
<div id="camera-container">
  <video id="camera-video" autoplay muted playsinline></video>
  <div id="scan-overlay">
    <div class="scan-frame"></div>
    <div class="scan-line"></div>
  </div>
  <button class="close-cam" id="close-cam-btn" title="Close camera">✕</button>

  <!-- Scan result confirmation bar -->
  <div id="scan-result-bar" style="display:none;">
    <div id="scan-result-label">Detected:</div>
    <div id="scan-result-value"></div>
    <div id="scan-result-actions">
      <button id="scan-confirm-btn">✅ Confirm</button>
      <button id="scan-rescan-btn">🔄 Re-scan</button>
    </div>
  </div>
</div>

<div class="page">
  <!-- Scan section -->
  <div class="scan-section">
    <button class="scan-btn-big" id="scan-btn">
      <span class="scan-icon">📷</span>
      Scan Barcode
    </button>
    <span class="manual-link" id="manual-toggle">Enter Device ID manually</span>

    <div id="manual-section" style="display:none;">
      <div class="manual-input-row">
        <input class="form-input" id="manual-input" placeholder="e.g. DEV01023" style="text-transform:uppercase;">
        <button class="btn btn-primary btn-inline" id="manual-submit-btn">Submit</button>
      </div>
    </div>
  </div>

  <!-- Checklist -->
  <div class="checklist-header">Expected Devices</div>
  <ul class="checklist" id="checklist"></ul>

  <!-- Grey zone devices (shown only when unexpected devices are scanned) -->
  <div class="checklist-header grey-zone-header" id="grey-zone-header" style="display:none;">
    ⚠ Grey Zone Devices
  </div>
  <ul class="checklist" id="grey-zone-list"></ul>
</div>

<!-- Sticky submit bar -->
<div class="submit-bar" id="submit-bar" style="display:none;">
  <a class="btn btn-success" href="/partner/complete" id="complete-btn">Review &amp; Submit →</a>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
let expectedDevices  = [];
let greyZoneDevices  = [];   // devices scanned but not on expected list
let scannedSet       = new Set();
let codeReader       = null;
let scanActive       = false;
let pendingScan      = null;

// ── Auth check ─────────────────────────────────────────────────────────────────
fetch('/api/partner/me')
  .then(r => { if (!r.ok) window.location.href = '/partner'; return r.json(); })
  .then(me => {
    if (me.submitted) { window.location.href = '/partner/complete'; return; }
    loadExpected();
  });

// ── Load expected list ─────────────────────────────────────────────────────────
async function loadExpected() {
  const res  = await fetch('/api/partner/expected');
  expectedDevices = await res.json();

  // Restore already-scanned devices from server state
  scannedSet = new Set(expectedDevices.filter(d => d.scanned).map(d => d.device_id));

  renderChecklist();
  updateProgress();
}

// ── Render ─────────────────────────────────────────────────────────────────────
function renderChecklist() {
  const list = document.getElementById('checklist');
  list.innerHTML = expectedDevices.map(dev => `
    <li class="checklist-item ${scannedSet.has(dev.device_id) ? 'verified' : ''}" id="item-${dev.device_id}">
      <span class="check-icon">${scannedSet.has(dev.device_id) ? '✅' : '⬜'}</span>
      <div class="device-info">
        <div class="device-id">${dev.device_id}</div>
        <div class="device-mac">${dev.mac_id}</div>
      </div>
    </li>
  `).join('');

  // Grey zone section
  const gzHeader = document.getElementById('grey-zone-header');
  const gzList   = document.getElementById('grey-zone-list');
  if (greyZoneDevices.length > 0) {
    gzHeader.style.display = '';
    gzList.innerHTML = greyZoneDevices.map(dev => `
      <li class="checklist-item verified grey-zone" id="item-${dev.device_id}">
        <span class="check-icon">✅</span>
        <div class="device-info">
          <div class="device-id">${dev.device_id}</div>
          <div class="device-mac">${dev.label || 'Not on expected list'}</div>
          <span class="grey-tag">⚠ Grey zone</span>
        </div>
      </li>
    `).join('');
  } else {
    gzHeader.style.display = 'none';
    gzList.innerHTML = '';
  }
}

function updateProgress() {
  const total     = expectedDevices.length;
  const verified  = expectedDevices.filter(d => scannedSet.has(d.device_id)).length;
  const remaining = total - verified;
  const pct       = total > 0 ? Math.round((verified / total) * 100) : 0;

  document.getElementById('progress-label').textContent =
    `${remaining} remaining of ${total} (${verified} verified)`;
  document.getElementById('progress-bar').style.width = `${pct}%`;

  // Show submit bar once at least 1 scanned
  document.getElementById('submit-bar').style.display = scannedSet.size > 0 ? 'block' : 'none';
}

// ── Scan processing ────────────────────────────────────────────────────────────
async function processScan(deviceId) {
  deviceId = deviceId.trim().toUpperCase();
  if (!deviceId) return;

  const res  = await fetch('/api/partner/scan', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ device_id: deviceId }),
  });
  const data = await res.json();

  if (data.status === 'already_scanned') {
    showToast('Already scanned: ' + deviceId, 'warning');
    return;
  }

  if (data.status === 'verified') {
    scannedSet.add(deviceId);
    const item = document.getElementById(`item-${deviceId}`);
    if (item) {
      item.classList.add('verified', 'flash');
      item.querySelector('.check-icon').textContent = '✅';
    }
    showToast('✅ ' + deviceId + ' — matched & verified!', 'success');
    updateProgress();
  } else if (data.status === 'unexpected') {
    // Not on expected list — add as grey zone and tick off
    const alreadyAdded = greyZoneDevices.some(d => d.device_id === deviceId);
    if (!alreadyAdded) {
      greyZoneDevices.push({ device_id: deviceId, label: data.label, category: data.category });
    }
    renderChecklist();
    showToast(`⚠ ${deviceId} — not on list, added as grey zone`, 'warning');
    updateProgress();
  } else if (data.error) {
    showToast('Error: ' + data.error, 'error');
  }
}

// ── Camera / ZXing ─────────────────────────────────────────────────────────────
document.getElementById('scan-btn').addEventListener('click', startCamera);
document.getElementById('close-cam-btn').addEventListener('click', stopCamera);

async function startCamera() {
  if (scanActive) return;

  const container = document.getElementById('camera-container');
  container.classList.add('active');
  container.scrollIntoView({ behavior: 'smooth', block: 'center' });

  try {
    if (typeof ZXing === 'undefined') {
      throw new Error('Barcode library not loaded. Please enter device ID manually.');
    }
    codeReader = new ZXing.BrowserMultiFormatReader();
    scanActive = true;

    // Get list of video devices
    const devices = await codeReader.listVideoInputDevices();
    // Prefer back camera on mobile
    let deviceId = undefined;
    const back = devices.find(d => /back|rear|environment/i.test(d.label));
    if (back) deviceId = back.deviceId;
    else if (devices.length > 0) deviceId = devices[devices.length - 1].deviceId;

    codeReader.decodeFromVideoDevice(deviceId, 'camera-video', (result, err) => {
      if (result && !pendingScan) {
        pendingScan = result.getText();
        document.getElementById('scan-result-value').textContent = pendingScan;
        document.getElementById('scan-result-bar').style.display = 'block';
        // Pause decoding while user reviews
        codeReader.stopContinuousDecode && codeReader.stopContinuousDecode();
      }
      // err is expected when no barcode in frame — ignore
    });
  } catch (err) {
    stopCamera();
    showToast(err.message || 'Camera error — use manual entry', 'warning');
  }
}

function stopCamera() {
  scanActive  = false;
  pendingScan = null;
  document.getElementById('scan-result-bar').style.display = 'none';
  if (codeReader) {
    try { codeReader.reset(); } catch (e) {}
    codeReader = null;
  }
  document.getElementById('camera-container').classList.remove('active');
}

// Confirm the detected barcode value
document.getElementById('scan-confirm-btn').addEventListener('click', () => {
  const value = pendingScan;
  stopCamera();
  if (value) processScan(value);
});

// Dismiss the result bar and resume scanning
document.getElementById('scan-rescan-btn').addEventListener('click', () => {
  pendingScan = null;
  document.getElementById('scan-result-bar').style.display = 'none';
});

// ── Manual entry ───────────────────────────────────────────────────────────────
document.getElementById('manual-toggle').addEventListener('click', () => {
  const sec = document.getElementById('manual-section');
  sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
  if (sec.style.display === 'block') document.getElementById('manual-input').focus();
});

document.getElementById('manual-submit-btn').addEventListener('click', () => {
  const val = document.getElementById('manual-input').value.trim();
  if (val) {
    processScan(val);
    document.getElementById('manual-input').value = '';
  }
});

document.getElementById('manual-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('manual-submit-btn').click();
});

// ── Toast ──────────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 3000);
}
</script>
</body>
</html>
